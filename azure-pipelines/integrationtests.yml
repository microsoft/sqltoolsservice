trigger:
  branches:
    include:
      - main
      - release/*

pr:
  branches:
    include:
      - main
      - release/*

variables:
  sqlImage: 'mcr.microsoft.com/mssql/server:2025-latest'
  sqlContainerName: 'sqltoolsservice-integration-tests'
  testResultsDirectory: '$(Agent.TempDirectory)/integration-test-results'

pool:
  name: ads-build-1es-hosted-pool
  demands:
    - ImageOverride -equals ADS-Linux_Image

steps:
  - task: UseDotNet@2
    displayName: Use .NET SDK from global.json
    inputs:
      useGlobalJson: true

  - task: Bash@3
    displayName: Create build directories expected by dotnet build
    inputs:
      filePath: ./azure-pipelines/createBuildDirectories.sh

  - task: NuGetAuthenticate@1

  - task: PowerShell@2
    displayName: Generate SQL authentication password
    inputs:
      targetType: inline
      script: |
        $chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.ToCharArray()
        $passwordBody = -join (1..24 | ForEach-Object { $chars[(Get-Random -Maximum $chars.Length)] })
        $sqlPassword = "A1!$passwordBody"
        Write-Host "##vso[task.setvariable variable=sql_password;issecret=true]$sqlPassword"
        Write-Host "##vso[task.setvariable variable=sqlOnPrem_password;issecret=true]$sqlPassword"
        Write-Host "##vso[task.setvariable variable=sqlAzure_password;issecret=true]$sqlPassword"

  - task: PowerShell@2
    displayName: Start SQL Server 2025 container
    inputs:
      targetType: inline
      script: |
        docker pull $(sqlImage)
        docker rm -f $(sqlContainerName) *> $null
        docker run `
          --detach `
          --name $(sqlContainerName) `
          --hostname $(sqlContainerName) `
          --publish 1433:1433 `
          --env ACCEPT_EULA=Y `
          --env MSSQL_PID=Developer `
          --env MSSQL_AGENT_ENABLED=true `
          --env MSSQL_SA_PASSWORD="$(sql_password)" `
          $(sqlImage)

  - task: PowerShell@2
    displayName: Create SQL login for integration tests
    inputs:
      targetType: inline
      script: |
        $ready = $false
        for ($attempt = 1; $attempt -le 30; $attempt++) {
          docker exec $(sqlContainerName) /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$(sql_password)" -C -Q "SELECT 1" *> $null
          if ($LASTEXITCODE -eq 0) {
            $ready = $true
            break
          }

          Start-Sleep -Seconds 5
        }

        if (-not $ready) {
          throw "SQL Server container did not become ready in time."
        }

        $sql = "IF NOT EXISTS (SELECT 1 FROM sys.sql_logins WHERE name = 'testAccount') BEGIN CREATE LOGIN [testAccount] WITH PASSWORD = '$(sql_password)', CHECK_POLICY = OFF; END; ALTER SERVER ROLE [sysadmin] ADD MEMBER [testAccount];"
        docker exec $(sqlContainerName) /opt/mssql-tools18/bin/sqlcmd `
          -S localhost `
          -U sa `
          -P "$(sql_password)" `
          -C `
          -Q $sql

  - task: PowerShell@2
    displayName: Write integration test connection instances file
    inputs:
      targetType: inline
      script: |
        @'
        <?xml version="1.0" encoding="utf-8"?>
        <Instances>
          <Instance VersionKey="sqlOnPrem">
            <DataSource>localhost</DataSource>
            <UserId>testAccount</UserId>
            <Password></Password>
          </Instance>
          <Instance VersionKey="sqlAzure">
            <DataSource>localhost</DataSource>
            <UserId>testAccount</UserId>
            <Password></Password>
          </Instance>
        </Instances>
        '@ | Set-Content -Path test/Microsoft.SqlTools.ServiceLayer.TestEnvConfig/SQLConnectionInstances.CI.xml

  - task: DotNetCoreCLI@2
    displayName: Generate integration test settings
    inputs:
      command: run
      projects: 'test/Microsoft.SqlTools.ServiceLayer.TestEnvConfig/Microsoft.SqlTools.ServiceLayer.TestEnvConfig.csproj'
      arguments: 'test/Microsoft.SqlTools.ServiceLayer.TestEnvConfig/SQLConnectionInstances.CI.xml'
    env:
      sqlOnPrem_password: '$(sqlOnPrem_password)'
      sqlAzure_password: '$(sqlAzure_password)'

  - task: DotNetCoreCLI@2
    displayName: Build integration tests
    inputs:
      command: build
      projects: 'test/Microsoft.SqlTools.ServiceLayer.IntegrationTests/Microsoft.SqlTools.ServiceLayer.IntegrationTests.csproj'
      arguments: '--configuration Release'

  - task: PowerShell@2
    displayName: Run integration tests
    continueOnError: true
    inputs:
      targetType: inline
      script: |
        New-Item -ItemType Directory -Force -Path '$(testResultsDirectory)' | Out-Null
        dotnet test test/Microsoft.SqlTools.ServiceLayer.IntegrationTests/Microsoft.SqlTools.ServiceLayer.IntegrationTests.csproj `
          --configuration Release `
          --no-build `
          --logger "trx;LogFileName=IntegrationTests.trx" `
          --results-directory '$(testResultsDirectory)'

  - task: PublishTestResults@2
    displayName: Publish integration test results
    condition: always()
    inputs:
      testResultsFormat: VSTest
      testResultsFiles: '$(testResultsDirectory)/*.trx'
      failTaskOnFailedTests: true
      testRunTitle: 'SqlToolsService Integration Tests'

  - task: PowerShell@2
    displayName: Stop SQL container
    condition: always()
    inputs:
      targetType: inline
      script: |
        docker rm -f $(sqlContainerName) *> $null
