# STS2 scenario (SPEC $14.2). Editing expectations to match broken behavior is forbidden.
name: huge-pages
tags: [query, edge, limits, dialect:neutral]
status: active
milestone: M3
adapter: fake
driver:
  query:
    - steps:
        - { type: resultSet, resultSetId: 0, columns: 4 }
        - { type: rows, resultSetId: 0, rows: 2000 }
        - { type: completed, rowsAffected: 2000 }
steps:
  - request:
      method: v2/connection.open
      params: { openId: open-1, profile: $profiles.fakeBasic }
    bind: { connectionId: $c }
  - request:
      method: v2/query.execute
      params: { connectionId: $c, sql: "select x from t" }
    bind: { queryId: $q }
  - waitForNotify: { method: v2/query.complete, count: 1 }
  - assertNotify: { method: v2/query.rows, count: 1 }
expect:
  invariants: [I1, I2, I3, I5, I6, I7, I9, I12]
