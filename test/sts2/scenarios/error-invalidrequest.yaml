# STS2 scenario (SPEC $14.2). Editing expectations to match broken behavior is forbidden.
name: error-invalidrequest
tags: [error, contract, dialect:neutral]
status: active
milestone: M2
adapter: fake
steps:
  - request:
      method: v2/connection.open
      params: { openId: open-1 }
    expectError: { dataCode: Sts2.InvalidRequest, jsonRpcCode: -32600 }
  - request:
      method: v2/connection.cancel
      params: { wrongField: true }
    expectError: { dataCode: Sts2.InvalidRequest }
expect:
  invariants: [I1, I5, I6, I7, I12]
