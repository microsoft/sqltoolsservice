# STS2 scenario (SPEC $14.2). Editing expectations to match broken behavior is forbidden.
# Dispose abandons the query: output (including the terminal) is suppressed (I3);
# disposed queries are exempt from I2 by definition.
name: dispose-while-streaming
tags: [query, dispose, dialect:neutral]
status: active
milestone: M3
adapter: fake
driver:
  query:
    - steps:
        - { type: resultSet, resultSetId: 0, columns: 1 }
        - { type: rows, resultSetId: 0, rows: 2 }
        - { type: hang }
steps:
  - request:
      method: v2/connection.open
      params: { openId: open-1, profile: $profiles.fakeBasic }
    bind: { connectionId: $c }
  - request:
      method: v2/query.execute
      params: { connectionId: $c, sql: "select x from t" }
    bind: { queryId: $q }
  - waitForNotify: { method: v2/query.rows, count: 1 }
  - request:
      method: v2/query.dispose
      params: { queryId: $q }
    expectResult: {}
  - assertNotify: { method: v2/query.complete, count: 0, settleMs: 300 }
  - request:
      method: v2/diagnostics.ping
      params: { echo: "post-dispose" }
    expectResult: { echo: "post-dispose" }
expect:
  invariants: [I1, I2, I3, I5, I6, I7, I12]
