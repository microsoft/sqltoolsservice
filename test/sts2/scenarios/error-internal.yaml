# STS2 scenario (SPEC $14.2). Editing expectations to match broken behavior is forbidden.
# The driver throws an unclassified exception; the runner must map it to Sts2.Internal.
name: error-internal
tags: [error, contract, dialect:neutral]
status: active
milestone: M3
adapter: fake
driver:
  query:
    - steps:
        - { type: crash }
steps:
  - request:
      method: v2/connection.open
      params: { openId: open-1, profile: $profiles.fakeBasic }
    bind: { connectionId: $c }
  - request:
      method: v2/query.execute
      params: { connectionId: $c, sql: "select x from t" }
    bind: { queryId: $q }
  - waitForNotify: { method: v2/query.complete, count: 1 }
  - assertNotify: { method: v2/query.complete, count: 1, match: { status: error, error: { code: Sts2.Internal } } }
expect:
  invariants: [I1, I2, I12]
