# STS2 scenario (SPEC $14.2). Editing expectations to match broken behavior is forbidden.
name: open-cancel-race
tags: [connection, cancel, race, dialect:neutral]
status: active
milestone: M2
adapter: fake
driver:
  open:
    - outcome: hang
steps:
  - request:
      method: v2/connection.open
      params: { openId: open-1, profile: $profiles.fakeBasic }
    await: false
    label: hangingOpen
  - request:
      method: v2/connection.cancel
      params: { openId: open-1 }
    expectResult: {}
  - awaitTerminal: { label: hangingOpen }
    expectError: { dataCode: Sts2.Canceled, jsonRpcCode: -32060 }
expect:
  invariants: [I1, I5, I6, I7, I8, I12]
