# STS2 scenario (SPEC $14.2). Editing expectations to match broken behavior is forbidden.
# rowCapture=digest: the journal must contain wrappers, never cells (RD1), and replay
# must stay digest-identical (I7 in digest mode).
name: row-digest-replay
tags: [privacy, replay, dialect:neutral]
status: active
milestone: M3
adapter: fake
config: { rowCapture: digest }
steps:
  - request:
      method: v2/connection.open
      params: { openId: open-1, profile: $profiles.fakeBasic }
    bind: { connectionId: $c }
  - request:
      method: v2/query.execute
      params: { connectionId: $c, sql: "select x from t" }
    bind: { queryId: $q }
  - waitForNotify: { method: v2/query.complete, count: 1 }
  - assertNotify: { method: v2/query.complete, count: 1, match: { status: succeeded } }
expect:
  invariants: [I1, I2, I3, I5, I6, I7, I12, RD1]
