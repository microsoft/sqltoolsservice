# STS2 scenario (SPEC $14.2). Editing expectations to match broken behavior is forbidden.
name: ack-duplicate
tags: [query, ack, idempotency, dialect:neutral]
status: active
milestone: M3
adapter: fake
driver:
  query:
    - steps:
        - { type: resultSet, resultSetId: 0, columns: 1 }
        - { type: rows, resultSetId: 0, rows: 1 }
        - { type: rows, resultSetId: 0, rows: 1 }
        - { type: completed, rowsAffected: 2 }
steps:
  - request:
      method: v2/connection.open
      params: { openId: open-1, profile: $profiles.fakeBasic }
    bind: { connectionId: $c }
  - request:
      method: v2/query.execute
      params: { connectionId: $c, sql: "select x from t" }
    bind: { queryId: $q }
  - waitForNotify: { method: v2/query.complete, count: 1 }
  - notify: { method: v2/query.ack, params: { queryId: $q, pageSeq: 0 } }
  - notify: { method: v2/query.ack, params: { queryId: $q, pageSeq: 0 } }
  - request:
      method: v2/diagnostics.ping
      params: { echo: "still alive" }
    expectResult: { echo: "still alive" }
expect:
  invariants: [I1, I2, I5, I6, I7, I12]
