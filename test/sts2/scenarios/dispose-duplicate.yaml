# STS2 scenario (SPEC $14.2). Editing expectations to match broken behavior is forbidden.
name: dispose-duplicate
tags: [query, dispose, idempotency, dialect:neutral]
status: active
milestone: M3
adapter: fake
steps:
  - request:
      method: v2/connection.open
      params: { openId: open-1, profile: $profiles.fakeBasic }
    bind: { connectionId: $c }
  - request:
      method: v2/query.execute
      params: { connectionId: $c, sql: "select x from t" }
    bind: { queryId: $q }
  - waitForNotify: { method: v2/query.complete, count: 1 }
  - request:
      method: v2/query.dispose
      params: { queryId: $q }
    expectResult: {}
  - request:
      method: v2/query.dispose
      params: { queryId: $q }
    expectResult: {}
  - request:
      method: v2/query.dispose
      params: { queryId: "q-never-existed" }
    expectResult: {}
expect:
  invariants: [I1, I2, I5, I6, I7, I12]
