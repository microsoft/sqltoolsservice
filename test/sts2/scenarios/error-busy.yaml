# STS2 scenario (SPEC $14.2). Editing expectations to match broken behavior is forbidden.
name: error-busy
tags: [error, limits, dialect:neutral]
status: active
milestone: M3
adapter: fake
driver:
  query:
    - steps:
        - { type: resultSet, resultSetId: 0, columns: 1 }
        - { type: rows, resultSetId: 0, rows: 2 }
        - { type: hang }
steps:
  - request:
      method: v2/connection.open
      params: { openId: open-1, profile: $profiles.fakeBasic }
    bind: { connectionId: $c }
  - request:
      method: v2/query.execute
      params: { connectionId: $c, sql: "select x from t" }
    bind: { queryId: $q }
  - request:
      method: v2/query.execute
      params: { connectionId: $c, sql: "select y" }
    expectError: { dataCode: Sts2.Busy, jsonRpcCode: -32061 }
  - request:
      method: v2/query.cancel
      params: { queryId: $q }
    expectResult: {}
  - waitForNotify: { method: v2/query.complete, count: 1 }
expect:
  invariants: [I1, I12]
