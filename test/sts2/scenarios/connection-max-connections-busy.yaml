# STS2 scenario (SPEC $14.2). Editing expectations to match broken behavior is forbidden.
name: connection-max-connections-busy
tags: [connection, limits, dialect:neutral]
status: active
milestone: M2
adapter: fake
config: { maxConnections: 2 }
steps:
  - request:
      method: v2/connection.open
      params: { openId: open-1, profile: $profiles.fakeBasic }
    bind: { connectionId: $c1 }
  - request:
      method: v2/connection.open
      params: { openId: open-2, profile: $profiles.fakeBasic }
    bind: { connectionId: $c2 }
  - request:
      method: v2/connection.open
      params: { openId: open-3, profile: $profiles.fakeBasic }
    expectError: { dataCode: Sts2.Busy, jsonRpcCode: -32061 }
  - request:
      method: v2/connection.close
      params: { connectionId: $c1 }
    expectResult: {}
  - request:
      method: v2/connection.close
      params: { connectionId: $c2 }
    expectResult: {}
expect:
  invariants: [I1, I5, I6, I7, I8, I12]
