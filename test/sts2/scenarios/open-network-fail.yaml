# STS2 scenario (SPEC $14.2). Editing expectations to match broken behavior is forbidden.
name: open-network-fail
tags: [connection, fault, dialect:neutral]
status: active
milestone: M2
adapter: fake
driver:
  open:
    - outcome: networkFail
steps:
