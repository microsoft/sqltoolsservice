# STS2 scenario (SPEC $14.2). Editing expectations to match broken behavior is forbidden.
# Eight pages scripted, window is 4: without acks only 4 may arrive (I9).
name: slow-consumer-backpressure
tags: [query, backpressure, dialect:neutral]
status: active
milestone: M3
adapter: fake
driver:
  query:
    - steps:
        - { type: resultSet, resultSetId: 0, columns: 1 }
        - { type: rows, resultSetId: 0, rows: 1 }
        - { type: rows, resultSetId: 0, rows: 1 }
        - { type: rows, resultSetId: 0, rows: 1 }
        - { type: rows, resultSetId: 0, rows: 1 }
        - { type: rows, resultSetId: 0, rows: 1 }
        - { type: rows, resultSetId: 0, rows: 1 }
        - { type: rows, resultSetId: 0, rows: 1 }
        - { type: rows, resultSetId: 0, rows: 1 }
        - { type: completed, rowsAffected: 8 }
steps:
  - request:
      method: v2/connection.open
      params: { openId: open-1, profile: $profiles.fakeBasic }
    bind: { connectionId: $c }
  - request:
      method: v2/query.execute
      params: { connectionId: $c, sql: "select x from t" }
    bind: { queryId: $q }
  - waitForNotify: { method: v2/query.rows, count: 4 }
  - assertNotify: { method: v2/query.rows, count: 4, settleMs: 300 }
  - assertNotify: { method: v2/query.complete, count: 0 }
  - notify: { method: v2/query.ack, params: { queryId: $q, throughPageSeq: 3 } }
  - waitForNotify: { method: v2/query.rows, count: 8 }
  - waitForNotify: { method: v2/query.complete, count: 1 }
expect:
  invariants: [I1, I2, I3, I5, I6, I7, I9, I12]
